    <!-- Reload Loop Guard + Service Worker Registration -->
    <script>
      // ============================================================
      // RELOAD LOOP GUARD — Prevents infinite reload from any source
      // ============================================================
      (function() {
        var RELOAD_KEY = '__opticonnect_reload_guard';
        var MAX_RELOADS = 3;
        var WINDOW_MS = 60000; // 60 seconds

        try {
          var raw = sessionStorage.getItem(RELOAD_KEY);
          var guard = raw ? JSON.parse(raw) : { count: 0, firstAt: Date.now() };

          // Reset counter if outside the time window
          if (Date.now() - guard.firstAt > WINDOW_MS) {
            guard = { count: 0, firstAt: Date.now() };
          }

          guard.count++;
          sessionStorage.setItem(RELOAD_KEY, JSON.stringify(guard));

          // If too many reloads, block ALL future reloads from JS
          if (guard.count > MAX_RELOADS) {
            // Override window.location.reload to prevent further loops
            window.location.reload = function() {
              console.warn('[ReloadGuard] Blocked reload — loop detected (' + guard.count + ' reloads in ' + Math.round((Date.now() - guard.firstAt)/1000) + 's). Clearing guard in 60s.');
            };
            // Auto-reset after the window expires so manual refresh works
            setTimeout(function() {
              sessionStorage.removeItem(RELOAD_KEY);
            }, WINDOW_MS);
          }
        } catch(e) { /* sessionStorage unavailable — skip guard */ }
      })();

      // ============================================================
      // SERVICE WORKER REGISTRATION
      // ============================================================
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js').then(function(registration) {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);

            // Listen for new service worker updates and activate them immediately
            registration.addEventListener('updatefound', function() {
              var newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'activated') {
                    console.log('New ServiceWorker activated successfully.');
                  }
                });
              }
            });
          }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
